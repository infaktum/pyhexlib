name: Build and deploy Sphinx documentation to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: { }

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-build
  cancel-in-progress: true

jobs:
  build:
    name: Build, upload and deploy Sphinx docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Try install pygame from wheel (fast path)
        run: |
          python -m pip install --upgrade pip
          # Try to install pygame from prebuilt wheel only. Don't fail if no wheel is available.
          python -m pip install --only-binary=:all: pygame || true
          # Install other requirements but exclude any line containing 'pygame' to avoid source build here
          if [ -f requirements.txt ]; then
            grep -vi 'pygame' requirements.txt > /tmp/reqs_no_pygame.txt || true
            python -m pip install -r /tmp/reqs_no_pygame.txt || true
          fi
          python -m pip install sphinx sphinx_rtd_theme myst-parser || true

      - name: "Fallback: install system deps and (re)install requirements if pygame wheel not available"
        run: |
          # If pygame is importable we skip the heavy system install; otherwise install deps and full requirements
          if python -c "import pygame" >/dev/null 2>&1; then
            echo "pygame already importable, skipping system deps"
          else
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
              build-essential pkg-config \
              libsdl1.2-dev libsdl-image1.2-dev libsdl-mixer1.2-dev libsdl-ttf2.0-dev \
              libsmpeg-dev libportmidi-dev \
              libavformat-dev libavcodec-dev libswscale-dev \
              libfreetype6-dev libjpeg-dev libpng-dev
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
            python -m pip install sphinx sphinx_rtd_theme myst-parser
          fi

      - name: Copy README  to docs
        run: |
          cp README.md docs/

      - name: Copy images to    docs
        run: |
          mkdir -p docs/images
          cp -r images/* docs/images/ 

      - name: Generate API docs with sphinx-apidoc (if modules exist)
        run: |
          set -e
          if [ -d src/pyhexlib ]; then
            sphinx-apidoc -o docs/api src/pyhexlib --force --separate --module-first || true
          fi
          if [ -d src/pyguilib ]; then
            sphinx-apidoc -o docs/api src/pyguilib --force --separate --module-first || true
          fi

      - name: Build Sphinx HTML
        run: |
          python -m sphinx -b html docs docs/_build/html

      - name: Upload HTML as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    environment: github-pages
    needs: build

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

