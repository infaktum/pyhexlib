name: Build and deploy Sphinx documentation to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: { }

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-build
  cancel-in-progress: true

jobs:
  build:
    name: Build, upload and deploy Sphinx docs
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [ "3.10" ]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements/*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          # Install package in editable mode so Sphinx autodoc can import the package from src/
          python -m pip install -e .
          # Pin Sphinx to a 7.x release to avoid incompatibilities with extensions
          python -m pip install 'sphinx<8' sphinx_rtd_theme myst-parser

      - name: Copy README  to docs
        run: |
          cp README.md docs/

      - name: Copy images to    docs
        run: |
          mkdir -p docs/images
          cp -r images/* docs/images/ 

      - name: Generate API docs with sphinx-apidoc (if modules exist)
        run: |
          set -e
          if [ -d src/pyhexlib ]; then
            sphinx-apidoc -o docs/api src/pyhexlib --force --separate --module-first || true
          fi


      - name: Build Sphinx HTML
        run: |
          # ensure html_static_path exists to avoid warnings
          mkdir -p docs/_static
          sphinx-build --version
          sphinx-build -b html docs docs/_build/html

      - name: Upload HTML as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    environment: github-pages
    needs: build

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

