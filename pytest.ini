[pytest]
# Minimum pytest version
minversion = 6.0

# Where tests live
# The tests are located in the `tests/` directory (plural).
testpaths = tests

# The repository's tests use capitalized filenames like `test_coordinates.py`
python_files = test_*.py

# Helpful default options (show extra summary info for skipped/failed tests)
addopts = -ra

# Silence noisy deprecation warnings from dependencies by default
filterwarnings = ignore::DeprecationWarning

# Do not recurse into build or src packages when collecting
norecursedirs = .git build dist src/*/tests


